name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl   # Linux (static, portable)
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin          # macOS (Intel)
            os: macos-13
            ext: ""
          - target: aarch64-apple-darwin         # macOS (Apple Silicon)
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc       # Windows
            os: windows-latest
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: musl toolchain (Linux static binary)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
      - name: Test
        run: cargo test --release --target ${{ matrix.target }} --verbose
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="genome${{ matrix.ext }}"
          dist="genome-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/$bin" "$dist/"
          cp README.md LICENSE "$dist/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$dist.zip" "$dist" >/dev/null
            asset="$dist.zip"
          else
            tar -czf "$dist.tar.gz" "$dist"
            asset="$dist.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    name: publish release (experimental)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "genome ${{ github.ref_name }} (experimental)"
          prerelease: true
          generate_release_notes: true
          body: |
            > ⚠️ **Experimental pre-release.** This is an early MVP. The genome schema,
            > CLI surface, and HTML output may change without notice. Not yet stable —
            > do not depend on it in production.

            **Prebuilt binaries** for the default, fully-offline `genome`
            (no network, no inference engine):

            | Platform | Asset |
            |---|---|
            | Linux x86_64 (static, musl) | `genome-*-x86_64-unknown-linux-musl.tar.gz` |
            | macOS Intel | `genome-*-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `genome-*-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64 | `genome-*-x86_64-pc-windows-msvc.zip` |

            The optional offline enrichment (embedded GGUF model) is a build-time
            feature — build from source with `cargo build --release --features enrich`.

            Verify a download against its `.sha256` before use.
          files: |
            artifacts/*
