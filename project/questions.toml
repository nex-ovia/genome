# genome/questions.toml — questions raised on the genome, routed by role lens.
#
# Referenced from nexovia.toml [include].questions. This is part of the CONTROL
# PLANE: the TOML is the database, the HTML is a read-only window onto it. Written
# by `genome ask`; rendered (read-only) per node and per snapshot.
#   target = a component id, or "*" for the whole snapshot
#   role   ∈ exec | arch | eng     status ∈ open | answered

