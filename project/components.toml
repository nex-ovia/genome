# genome/nodes.toml — the project's components and links (the volatile structural
# reality). Referenced from nexovia.toml [include].components. Today every node is
# by=human/status=planned (design-first); the scanner will fill/flip these per
# commit, and drift = this file diverging from the architecture spine.

[components.genome_model]
label   = "Genome model"
path    = "src/genome/model.rs"
kind    = "module"
layer   = "execution"
status  = "active"
summary = "Serde types for Genome, Project, Node, Edge, Provenance, Policy, Layer. The canonical in-memory shape of a genome."
why     = "One schema that every adapter converges on. Changing these types changes the whole product surface, so they live alone and change deliberately."
tags    = ["core", "contract"]
functions = ["Genome", "Project", "Node", "Edge", "Provenance", "Policy", "Layer"]
libraries = ["serde"]

[components.genome_model.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.genome_merge]
label   = "Provenance-aware merge"
path    = "src/genome/merge.rs"
kind    = "module"
layer   = "execution"
status  = "proposed"
summary = "Merges a freshly-derived genome onto the existing one field by field, honoring provenance: by=human and by=agent fields are sticky and never overwritten by a machine guess."
why     = "The rule that makes the genome safe to edit. Without it, re-running the tool would erase human intent — the single failure that would kill trust in the whole idea."
tags    = ["core", "merge"]
functions = ["merge", "merge_field", "is_sticky"]
libraries = []

[components.genome_merge.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.genome_io]
label   = "Genome I/O"
path    = "src/genome/io.rs"
kind    = "module"
layer   = "persistence"
status  = "active"
summary = "Reads and writes nexovia.toml — parse in, deterministic stable-ordered serialization out so diffs stay clean."
why     = "The genome is version-controlled, so byte-stable output matters as much as correctness: a re-run that reorders keys produces noise in every PR."
tags    = ["io"]
functions = ["read", "write", "to_toml_stable"]
libraries = ["toml", "serde"]

[components.genome_io.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.ingest_scan]
label   = "Code scanner"
path    = "src/ingest/scan.rs"
kind    = "module"
layer   = "persistence"
status  = "proposed"
summary = "Deterministically walks a repo: detects languages, builds the node tree, extracts import/dependency edges, and lists each file's functions and libraries. Fills structural fields by=scan, confidence=1.0; leaves semantic fields empty for enrichment."
why     = "Structure is knowable without a model, so it must be captured deterministically and for free before any LLM is involved. Scan output is the trustworthy skeleton."
tags    = ["ingest", "code"]
functions = ["scan", "scan_changed", "detect_languages", "build_tree", "import_edges", "file_symbols"]
libraries = ["walkdir", "ignore"]

[components.ingest_scan.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.ingest_doc]
label   = "Doc / prompt ingester"
path    = "src/ingest/doc.rs"
kind    = "module"
layer   = "persistence"
status  = "active"
summary = "Turns a document or prompt into a design-first genome skeleton: markdown sections and headings become nodes (often without a path, since the code may not exist yet)."
why     = "The design-first flow is the strongest differentiator — it produces a genome before a line of code is written. This is how a spec or an idea enters the system."
tags    = ["ingest", "doc"]
functions = ["from_doc", "from_prompt", "sections_to_nodes"]
libraries = ["pulldown-cmark"]

[components.ingest_doc.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.enrich_llm]
label   = "LLM enrichment"
path    = "src/enrich/llm.rs"
kind    = "module"
layer   = "persistence"
status  = "active"
summary = "Optional, feature-gated pass that fills empty semantic fields — summary, why — using an embedded in-process GGUF \"flash\" model (no server, no network). Stamps each by=llm with a calibrated confidence."
why     = "The hybrid intelligence lives here and only here, kept off the default path so the core binary stays small. Embedded GGUF means comprehension for non-developers works fully offline — the efficiency policy holds even while enriching."
tags    = ["enrich", "optional"]
functions = ["enrich", "generate", "ensure_model"]
libraries = ["llama-cpp-2 (embedded GGUF, feature: enrich)", "ureq", "toml_edit"]

[components.enrich_llm.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.render_html]
label   = "HTML renderer"
path    = "src/render/html.rs"
kind    = "module"
layer   = "surface"
status  = "active"
summary = "Reads a genome and emits a single self-contained, offline HTML document: project intent, architecture, module graph, per-module functions/libraries, policies, and commit tracking. Must reproduce mock/report.html."
why     = "The human-understanding output — the visible half of the value proposition, so its fidelity to the hand-built mock is the acceptance test for Phase 1."
tags    = ["render", "surface"]
functions = ["render", "embed_genome", "section_architecture", "section_graph", "section_policies"]
libraries = []

[components.render_html.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.validate]
label   = "Validator"
path    = "src/validate.rs"
kind    = "module"
layer   = "governance"
status  = "active"
summary = "Reads the grammar at schema/nexovia-2.toml ([rules]) and checks every genome against it: integrity (no dangling links/unknown enums), honesty (no machine-written field without provenance), the architecture dependency rule, and validated policies. Fed a PR diff by track, it gates changes that drift from the schema, architecture, or policies."
why     = "The genome describes its own quality bar; this module makes that bar binding. It replaces the old governance gates with checks the genome itself declares."
tags    = ["validate", "governance"]
functions = ["validate", "check_integrity", "check_honesty", "enforce_policies"]
libraries = []

[components.validate.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.agent_mcp]
label   = "Agent protocol (MCP)"
path    = "src/agent/mcp.rs"
kind    = "module"
layer   = "surface"
status  = "proposed"
summary = "Optional, feature-gated MCP/stdio server exposing get_node, set_field, list, and validate so coding agents become first-class authors of the genome."
why     = "Integration is the second-phase goal. A stable read/write protocol is what lets Claude Code or Cursor treat the genome as shared source of truth instead of a throwaway artifact."
tags    = ["agent", "optional"]
functions = ["serve", "get_node", "set_field", "list"]
libraries = ["rmcp (feature: agent)"]

[components.agent_mcp.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.track]
label   = "Change tracker"
path    = "src/track.rs"
kind    = "module"
layer   = "orchestration"
status  = "proposed"
summary = "Computes the changed file set from a commit or PR diff and drives an incremental scan + merge + re-render — so the genome and its HTML stay live without rescanning the whole repo."
why     = "A genome that drifts is worthless. Tracking only the diff per commit/PR keeps it cheap enough to run on every change, turning nexovia into a live view instead of a one-shot snapshot."
tags    = ["track", "live"]
functions = ["on_commit", "on_pr", "changed_files", "incremental"]
libraries = ["git2"]

[components.track.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

[components.cli]
label   = "CLI dispatch"
path    = "src/cli.rs"
kind    = "module"
layer   = "orchestration"
status  = "active"
summary = "Argument parsing and subcommand dispatch: scan, from-doc, from-prompt, enrich, render, validate, serve. Owns no business logic — wires the pieces together."
why     = "A single thin entrypoint keeps the surface obvious and the modules independently testable; all decisions belong in the modules it calls."
tags    = ["orchestration", "entrypoint"]
functions = ["main", "Args", "dispatch"]
libraries = ["clap", "anyhow"]

[components.cli.provenance]
summary = { by = "human", confidence = 1.0 }
why     = { by = "human", confidence = 1.0 }

# ─────────────────────────────────────────────────────────────────────────────
