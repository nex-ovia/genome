# genome/lifecycle.toml — product lifecycle: features, enhancements, bugs.
#
# Referenced from nexovia.toml [include].lifecycle. THIS FILE IS THE PLAN: the MVP
# is the live loop (understand → ask → approve), built document-first and fully
# offline; the engine work (scan/LSP/scaffold/freeze/track/MCP) is deferred as
# `proposed` until promoted. Each item links to the components it touches.
#   status ∈ proposed | planned | in_progress | active | shipped | deprecated
#   kind   ∈ feature | enhancement | bug | chore | spike

# ── MVP: the human-in-the-loop comprehension + approval window ────────────────

[[item]]
id       = "phase0-spec"
kind     = "chore"
title    = "Author the design-first genome + interactive mock"
status   = "shipped"
priority = "high"
components = ["genome_model", "render_html"]
why      = "The dogfood: build the spec and the visual target before any Rust."

[[item]]
id       = "feat-contract-render"
kind     = "feature"
title    = "Genome contract + HTML renderer (reproduce the mock)"
status   = "in_progress"
priority = "high"
components = ["genome_model", "genome_io", "render_html"]
why      = "Phase 1 — prove schema + TOML→HTML by reproducing this page from the TOML. Built; under review."

[[item]]
id       = "chore-plan-as-genome"
kind     = "chore"
title    = "Encode the MVP plan into the genome (facets + scoping)"
status   = "in_progress"
priority = "high"
components = ["genome_model", "render_html"]
why      = "The genome is the plan: add questions/approvals facets, re-spec enrich to embedded GGUF, scope the MVP, defer the engine. No separate plan doc."

[[item]]
id       = "feat-validate"
kind     = "feature"
title    = "Validator — schema + honesty + integrity gates"
status   = "in_progress"
priority = "high"
components = ["validate"]
why      = "Makes the genome's own quality bar binding; question/approval targets must resolve. Powers PR gates."

[[item]]
id       = "feat-doc-ingest"
kind     = "feature"
title    = "Document → design-first genome"
status   = "in_progress"
priority = "high"
components = ["ingest_doc"]
why      = "The MVP entry point: a spec/one-pager becomes a genome a non-developer can read."

[[item]]
id       = "feat-enrich-offline"
kind     = "feature"
title    = "Offline enrichment via embedded GGUF (feature: enrich)"
status   = "planned"
priority = "high"
components = ["enrich_llm"]
why      = "Plain-language summary/why per node so non-developers understand — fully offline, no network, no server."

[[item]]
id       = "feat-loop"
kind     = "feature"
title    = "Questions + approvals loop (ask / approve, per node + snapshot)"
status   = "in_progress"
priority = "high"
components = ["genome_model", "genome_io", "render_html", "cli"]
why      = "Closes the MVP: TOML is the database for questions/approvals; the HTML reflects them under the three lenses."

# ── Deferred engine — design for, build later (one branch + PR when promoted) ──

[[item]]
id       = "feat-scan"
kind     = "feature"
title    = "Codebase ingest via tree-sitter (precision)"
status   = "proposed"
priority = "medium"
components = ["ingest_scan", "genome_merge"]
why      = "Read an existing repo with precision of clarity; merge keeps human/agent edits sticky."

[[item]]
id       = "feat-lsp"
kind     = "feature"
title    = "LSP surface (+ optional cross-file edges)"
status   = "proposed"
priority = "low"
why      = "Let non-developers hover and navigate the architecture inside their IDE."

[[item]]
id       = "feat-scaffold"
kind     = "feature"
title    = "Scaffold a stub file tree from an approved genome"
status   = "proposed"
priority = "low"
why      = "For a new project: emit a starting skeleton that matches the approved architecture."

[[item]]
id       = "feat-freeze"
kind     = "feature"
title    = "Freeze + drift (status frozen + content-hash baseline)"
status   = "proposed"
priority = "medium"
why      = "Approve → lock the architecture as the authoritative baseline; measure code drift against it."

[[item]]
id       = "feat-track"
kind     = "feature"
title    = "Incremental scan + re-render on commit/PR"
status   = "proposed"
priority = "low"
components = ["track"]
why      = "Makes it a live tool once codebase ingest exists; drift and completion update per change."

[[item]]
id       = "feat-mcp"
kind     = "feature"
title    = "MCP server (agents write proposals / questions)"
status   = "proposed"
priority = "low"
components = ["agent_mcp"]
why      = "Integration: agents become first-class authors of the genome alongside humans."

[[item]]
id       = "feat-enrich-cloud"
kind     = "enhancement"
title    = "Optional cloud enrichment (BYO key, feature-gated)"
status   = "proposed"
priority = "low"
components = ["enrich_llm"]
why      = "A heavier-accuracy path for those who opt in; the default stays offline embedded GGUF."
